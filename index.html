<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🖤</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;display:flex;justify-content:center;align-items:center;font-family:Arial}
body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle,#111 0,#000 70%)}
.container{position:relative;display:flex;flex-direction:column;align-items:center;z-index:2}
.avatarWrap{position:relative;width:52vmin;height:52vmin}
.avatar{width:100%;height:100%;border-radius:50%;object-fit:cover;border:4px solid #fff;animation:pulse 4s ease-in-out infinite;position:relative;z-index:3}
.ring,.ring2{position:absolute;inset:-12px;border-radius:50%;border:1.5px solid rgba(255,255,255,.45)}
.ring{animation:spin 14s linear infinite}
.ring2{inset:-24px;border-color:rgba(255,255,255,.2);animation:spinR 22s linear infinite}
.ring:before,.ring2:before{content:"";position:absolute;width:8px;height:8px;border-radius:50%;background:#fff;box-shadow:0 0 12px #fff;top:-4px;left:50%}
#particles{position:absolute;inset:-120px;pointer-events:none}
.p{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;box-shadow:0 0 10px #fff}
.heart{margin-top:18px;font-size:48px;color:#000;text-shadow:0 0 8px #fff,0 0 18px #fff;animation:beat 2s infinite}
.text{color:#fff;font-size:2rem;font-weight:700;margin-top:10px;text-shadow:0 0 12px #fff8}
@keyframes pulse{50%{transform:scale(1.04);box-shadow:0 0 35px #fff8}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinR{to{transform:rotate(-360deg)}}
@keyframes beat{50%{transform:scale(1.15)}}
</style></head>
<body><div class="container">
<div class="avatarWrap" id="wrap">
<div class="ring"></div><div class="ring2"></div>
<div id="particles"></div>
<img class="avatar" src="lina.jpg">
</div>
<div class="heart">🖤</div><div class="text">Лина ягодка 🍓</div>
</div>
<script>
const box=document.getElementById('particles');
let t=0;
for(let i=0;i<90;i++){
 const d=document.createElement('div');d.className='p';box.appendChild(d);
 d.a=Math.random()*Math.PI*2;d.r=110+Math.random()*120;d.s=.003+Math.random()*.01;d.o=Math.random()*Math.PI*2;
}
function anim(){
 t+=0.01;
 [...box.children].forEach((d,i)=>{
   d.a+=d.s;
   const r=d.r+Math.sin(t*2+d.o)*12;
   const x=Math.cos(d.a+i*.03)*r;
   const y=Math.sin(d.a+i*.03)*r;
   d.style.transform=`translate(${x}px,${y}px) scale(${0.6+0.4*Math.sin(t*4+d.o)})`;
   d.style.opacity=.25+.75*(0.5+0.5*Math.sin(t*3+d.o));
 });
 requestAnimationFrame(anim);
}
anim();
</script></body></html>
