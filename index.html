<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🖤</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    animation:fadeIn 1.5s ease;
}

.avatar{
    width:52vmin;
    height:52vmin;
    object-fit:cover;
    border-radius:50%;
    border:5px solid #fff;
    box-shadow:0 0 25px rgba(255,255,255,.35);
    animation:pulse 3s ease-in-out infinite;
    z-index:2;
}

.heart{
    margin-top:18px;
    font-size:50px;
    color:#000;
    text-shadow:
        0 0 6px #fff,
        0 0 12px #fff,
        0 0 20px rgba(255,255,255,.8);
    animation:heartBeat 2s ease-in-out infinite;
    z-index:2;
}

.text{
    margin-top:15px;
    color:#fff;
    font-size:2rem;
    font-weight:700;
    letter-spacing:1px;
    text-shadow:0 0 12px rgba(255,255,255,.45);
    z-index:2;
}

/* Искорки */

.sparkle{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    box-shadow:0 0 8px white;
    animation:float 6s linear infinite;
    opacity:.8;
}

/* Расположение */

.s1{top:10%;left:25%;animation-delay:0s;}
.s2{top:18%;right:20%;animation-delay:1s;}
.s3{top:38%;left:8%;animation-delay:2s;}
.s4{top:42%;right:8%;animation-delay:3s;}
.s5{bottom:35%;left:18%;animation-delay:4s;}
.s6{bottom:28%;right:20%;animation-delay:5s;}
.s7{top:55%;left:45%;animation-delay:1.5s;}
.s8{top:8%;left:55%;animation-delay:2.8s;}
.s9{bottom:18%;left:40%;animation-delay:3.6s;}
.s10{bottom:12%;right:35%;animation-delay:4.8s;}

@keyframes float{
    0%{
        transform:translateY(0) scale(0.7);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    50%{
        transform:translateY(-15px) translateX(8px) scale(1.3);
    }
    80%{
        opacity:1;
    }
    100%{
        transform:translateY(-30px) translateX(-8px) scale(.7);
        opacity:0;
    }
}

@keyframes pulse{
    0%{
        transform:scale(1);
        box-shadow:0 0 20px rgba(255,255,255,.3);
    }
    50%{
        transform:scale(1.05);
        box-shadow:0 0 45px rgba(255,255,255,.75);
    }
    100%{
        transform:scale(1);
        box-shadow:0 0 20px rgba(255,255,255,.3);
    }
}

@keyframes heartBeat{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.15);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>

<body>

<div class="container">

    <span class="sparkle s1"></span>
    <span class="sparkle s2"></span>
    <span class="sparkle s3"></span>
    <span class="sparkle s4"></span>
    <span class="sparkle s5"></span>
    <span class="sparkle s6"></span>
    <span class="sparkle s7"></span>
    <span class="sparkle s8"></span>
    <span class="sparkle s9"></span>
    <span class="sparkle s10"></span>

    <img src="lina.jpg" class="avatar" alt="Лина">

    <div class="heart">🖤</div>

    <div class="text">Лина ягодка 🍓</div>

</div>

</body>
</html>
